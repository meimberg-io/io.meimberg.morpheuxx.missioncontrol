services:
  missioncontrol-dev:
    image: missioncontrol:dev
    restart: unless-stopped
    env_file: .env.dev
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.missioncontrol-dev.rule=Host(`mission-control-dev.morpheuxx.meimberg.io`)"
      - "traefik.http.routers.missioncontrol-dev.entrypoints=websecure"
      - "traefik.http.routers.missioncontrol-dev.tls.certresolver=letsencrypt"
      - "traefik.http.routers.missioncontrol-dev.middlewares=missioncontrol-dev-auth"
      - "traefik.http.services.missioncontrol-dev.loadbalancer.server.port=3000"
      # Basic Auth middleware — MICO-9. Credentials via MC_BASIC_AUTH_USERS env var (never committed).
      # Generate: htpasswd -nb <user> <pass>  (store result without $-escaping in the env var)
      - "traefik.http.middlewares.missioncontrol-dev-auth.basicauth.users=${MC_BASIC_AUTH_USERS}"

networks:
  traefik:
    external: true
